<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#dc2626" />
    <title>NODO360 — Plataforma de Gestión Operativa para Bomberos</title>
    <meta name="description" content="NODO360: central de despachos, emergencias, inventario, flota y finanzas para cuerpos de bomberos de Chile." />
    <!-- Aplicar tema antes de render para evitar flash -->
    <script>
      (function() {
        try {
          var stored = JSON.parse(localStorage.getItem('nodo360-theme') || '{}');
          var theme = stored.state?.theme || 'dark';
          if (theme !== 'light') document.documentElement.classList.add('dark');
        } catch(e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
